name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Validate"]
    types:
      - completed
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, 'v')) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build

      - name: Create HACS zip
        run: |
          mkdir -p dist/hacs
          cd custom_components
          zip -r ../dist/hacs/flight_tracker-${GITHUB_REF_NAME#v}.zip flight_tracker/
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            dist/hacs/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate HACS version
        run: |
          python -c "
          import json
          import re
          with open('hacs.json') as f:
              hacs = json.load(f)
          version = re.search(r'v(.+)', '${{ github.ref_name }}').group(1)
          assert hacs['version'] == version, f'Version mismatch: hacs.json={hacs[\"version\"]} tag={version}'
          print(f'Version {version} matches hacs.json')
          "